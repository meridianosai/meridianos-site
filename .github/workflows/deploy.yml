name: Deploy Site to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ec2-site-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (CI)
    runs-on: ubuntu-latest
    env:
      # build 不连库(DB client 为 lazy),仅需一个合法占位
      DATABASE_URL: postgresql://build:build@localhost:5432/build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint app components lib

      - name: Build
        run: npm run build

  deploy:
    name: Deploy (CD)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      EC2_APP_DIR: ${{ secrets.SITE_APP_DIR || '/opt/meridian/site' }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
      SITE_ENV_FILE: ${{ secrets.SITE_ENV_FILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          set -euo pipefail
          missing=()
          for key in EC2_HOST EC2_USER EC2_PORT EC2_APP_DIR EC2_SSH_KEY; do
            if [ -z "${!key:-}" ]; then missing+=("$key"); fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Install rsync
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y rsync
          fi

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          if [ -n "${EC2_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$EC2_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "mkdir -p '$EC2_APP_DIR'"

      - name: Sync app files
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.next/' \
            --exclude 'node_modules/' \
            --exclude 'docs/' \
            --exclude '.env' \
            --exclude '.env.local' \
            -e "ssh -i ~/.ssh/ec2_deploy_key -p $EC2_PORT" \
            ./ "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/"

      - name: Upload environment file
        if: ${{ env.SITE_ENV_FILE != '' }}
        run: |
          set -euo pipefail
          printf '%s' "$SITE_ENV_FILE" | ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "umask 077 && cat > '$EC2_APP_DIR/.env'"

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && bash scripts/deploy-ec2.sh"
